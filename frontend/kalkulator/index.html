<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoKalkulator Pro - Premium GIS & OZE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #eaf4ff;
            --glass: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(125, 173, 230, 0.35);
            --accent: #38bdf8;
            --blue: #2563eb;
            --red: #1d4ed8;
            --text: #0b1f3a;
            --text-muted: #2f5278;
        }

        body { 
            margin: 0; font-family: 'Outfit', sans-serif; 
            display: flex; flex-direction: column; height: 100vh; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }
        .split-layout {
            display: grid;
            grid-template-columns: minmax(460px, 1fr) minmax(560px, 1.2fr);
            gap: 14px;
            height: 100vh;
            padding: 14px;
            box-sizing: border-box;
        }
        #geoportal-view {
            min-width: 0;
        }
        #calc-view {
            min-width: 0;
        }

        nav { 
            background: rgba(219, 234, 254, 0.8); backdrop-filter: blur(12px);
            display: flex; justify-content: center; gap: 10px; padding: 10px;
            border-bottom: 1px solid var(--glass-border); z-index: 3000;
        }

        .tab { 
            padding: 12px 24px; cursor: pointer; border: 1px solid transparent; 
            background: none; color: var(--text-muted); font-weight: 600; 
            border-radius: 12px; transition: all 0.4s ease;
        }
        .tab.active { color: var(--text); background: var(--glass); border-color: var(--glass-border); }

        .view { position: relative; height: 100%; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); }
        .view.active { display: block; animation: fadeIn 0.5s ease; }
        .map-fullscreen-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 20;
            border: 1px solid rgba(147, 197, 253, 0.75);
            background: rgba(219, 234, 254, 0.9);
            color: #1e3a8a;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.35px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: all 0.2s ease;
        }
        .map-fullscreen-btn:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .calc-wrapper { 
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
            background: radial-gradient(circle at bottom left, #bfdbfe, #eaf4ff);
        }
        .calc-tab-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .calc-tab-btn {
            border: 1px solid rgba(59, 130, 246, 0.55);
            background: rgba(219, 234, 254, 0.7);
            color: var(--text-muted);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .calc-tab-btn.active {
            background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
            color: #0f2742;
            border-color: rgba(96, 165, 250, 0.8);
            box-shadow: 0 8px 16px -10px rgba(37, 99, 235, 0.8);
        }
        .calc-tab-pane {
            display: none;
            min-height: 0;
            flex: 1;
            width: 100%;
        }
        .calc-tab-pane.active {
            display: flex;
        }
        .calc-tab-pane > .premium-card {
            width: 100%;
            height: 100%;
        }
        #calc-tab-pane-wynik {
            justify-content: center;
            align-items: stretch;
        }
        #calc-tab-pane-wynik > .premium-card {
            max-width: 920px;
            margin: 0 auto;
        }
        .premium-card { 
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 16px 30px -10px rgba(59, 130, 246, 0.25); overflow: hidden;
            display: flex; flex-direction: column;
            min-height: 0;
        }
        .premium-card.total-card {
            margin-top: 0;
            min-height: 0;
        }
        .premium-card.total-card .card-header {
            padding: 20px 25px;
            font-size: 11px;
        }
        .premium-card.total-card .summary-box {
            margin: 15px 25px;
            padding: 20px 22px;
            min-height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .premium-card.total-card .range-value {
            font-size: 34px;
            margin-top: 6px;
            width: 100%;
            text-align: center;
        }
        .summary-caption {
            display: block;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
        }
        .premium-card.total-card #breakdown-total {
            width: 100%;
        }
        .card-header { background: rgba(191, 219, 254, 0.35); padding: 14px 18px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #075985; border-bottom: 1px solid var(--glass-border); }
        .parcel-controls {
            margin: 12px 16px 10px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(147, 197, 253, 0.4);
            background: linear-gradient(135deg, rgba(219, 234, 254, 0.72) 0%, rgba(219, 234, 254, 0.42) 100%);
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .control-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-field label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .control-field input,
        .control-field select {
            width: 100%;
            height: 40px;
            box-sizing: border-box;
        }
        .control-field select {
            text-align-last: left;
        }
        #in-price {
            text-align: right;
        }
        @media (max-width: 860px) {
            .parcel-controls {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1600px) {
            .split-layout {
                grid-template-columns: minmax(380px, 0.95fr) minmax(500px, 1.05fr);
                gap: 12px;
                padding: 12px;
            }
        }

        @media (max-width: 1366px) {
            .split-layout {
                grid-template-columns: minmax(340px, 0.9fr) minmax(460px, 1.1fr);
                gap: 10px;
                padding: 10px;
            }
            #calc-tab-pane-wynik > .premium-card {
                max-width: 100%;
            }
        }

        @media (max-width: 1180px) {
            .split-layout {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }
            #geoportal-view {
                min-height: 46vh;
            }
            #calc-view {
                min-height: 50vh;
            }
        }

        @media (max-width: 768px) {
            body {
                height: auto;
                overflow: auto;
            }
            .split-layout {
                padding: 8px;
                gap: 8px;
                height: auto;
                min-height: 100vh;
            }
            .view {
                border-radius: 16px;
            }
            #geoportal-view {
                min-height: 40vh;
            }
            #calc-view {
                min-height: auto;
            }
            .calc-wrapper {
                padding: 10px;
                gap: 10px;
            }
            .premium-card,
            .premium-card.total-card {
                border-radius: 16px;
            }
            .card-header {
                padding: 12px 14px;
                font-size: 10px;
            }
            .parcel-controls {
                margin: 10px 10px 8px;
                padding: 10px;
            }
            .btn-add-group {
                padding: 8px 10px;
                position: static !important;
                backdrop-filter: none !important;
            }
            .btn-add {
                font-size: 11px;
                padding: 9px;
            }
            #infra-container {
                padding: 8px 10px;
                overflow: visible;
            }
            .summary-box {
                margin: 10px;
                padding: 12px;
            }
            .range-value {
                font-size: 20px;
            }
            .code-panels {
                margin: 0 10px 12px;
            }
            .generated-code {
                font-size: 22px;
                letter-spacing: 3px;
            }
            input,
            select {
                width: 100%;
            }
        }

        @media (max-width: 520px) {
            .split-layout {
                padding: 6px;
            }
            .btn-add-group {
                display: grid;
                grid-template-columns: 1fr;
            }
            .summary-caption {
                font-size: 10px;
            }
            .generated-code {
                font-size: 20px;
                letter-spacing: 2px;
            }
        }
        
        input, select { background: rgba(255, 255, 255, 0.9); border: 1px solid var(--glass-border); color: #1e3a8a; padding: 8px; border-radius: 10px; text-align: right; font-weight: 600; outline: none; font-family: inherit; }
        input { width: 110px; }
        select { width: 180px; text-align-last: right; }

        .summary-box {
            margin: 15px 25px; padding: 15px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.14) 0%, rgba(125, 211, 252, 0.04) 100%);
            border: 1px solid rgba(147, 197, 253, 0.35); text-align: center;
        }
        .range-value { font-size: 24px; font-weight: 800; color: #1e3a8a; margin-top: 5px; }
        .code-panels {
            margin: 0 25px 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            max-width: 720px;
            width: 100%;
            align-self: center;
        }
        .code-panel {
            border: 1px solid rgba(147, 197, 253, 0.45);
            border-radius: 16px;
            padding: 12px;
            background: rgba(219, 234, 254, 0.45);
        }
        .code-panel-title {
            font-size: 11px;
            font-weight: 800;
            color: #1d4ed8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .seller-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
            align-items: end;
        }
        .seller-fields .control-field {
            align-items: center;
        }
        .seller-fields .control-field label {
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .seller-fields .control-field input,
        .seller-fields .control-field select {
            width: 100%;
            height: 44px;
            text-align: center;
            text-align-last: center;
        }
        .seller-fields--save-panel {
            grid-template-columns: 1fr;
            align-items: stretch;
        }
        .handlowiec-code-digits {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
            margin-top: 6px;
        }
        .handlowiec-digit-input {
            width: 48px !important;
            height: 48px !important;
            min-width: 48px;
            padding: 0 !important;
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            border-radius: 12px;
        }
        .control-field--handlowiec-code label {
            width: 100%;
        }
        @media (max-width: 860px) {
            .seller-fields:not(.seller-fields--save-panel) {
                grid-template-columns: 1fr;
            }
        }
        .code-generate-btn {
            width: 100%;
            border: 1px solid rgba(59, 130, 246, 0.6);
            border-radius: 10px;
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            color: #0f2742;
            font-weight: 800;
            cursor: pointer;
            padding: 10px 12px;
            text-transform: uppercase;
            font-size: 11px;
        }
        .code-generate-btn:hover {
            filter: brightness(1.05);
        }
        .generated-code {
            margin-top: 8px;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #1e3a8a;
            min-height: 32px;
        }
        .code-help {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            min-height: 14px;
        }

        .breakdown-list {
            margin-top: 0;
            padding: 0 15px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: left;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.25s ease;
        }
        .summary-box:hover .breakdown-list {
            margin-top: 10px;
            max-height: 320px;
            opacity: 1;
        }
        .breakdown-item {
            display: flex; justify-content: space-between; padding: 4px 0; border-top: 1px solid rgba(125, 173, 230, 0.25);
        }

        .btn-add-group { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px; background: rgba(191, 219, 254, 0.3); }
        .btn-add {
            flex: 1; padding: 10px; border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, var(--accent) 0%, #3b82f6 100%);
            color: #0f2742; cursor: pointer; font-size: 10px; font-weight: 800;
            transition: 0.3s;
        }
        .btn-add-energy {
            background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
            border-color: rgba(96, 165, 250, 0.65);
        }
        .btn-add-gas {
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            border-color: rgba(56, 189, 248, 0.65);
        }
        .btn-add:hover { filter: brightness(1.05); transform: translateY(-1px); }
        
        .infra-item { 
            background: rgba(255, 255, 255, 0.72); 
            border: 1px solid var(--glass-border); 
            margin: 0; 
            padding: 14px; 
            border-radius: 14px; 
            position: relative; 
            transition: all 0.3s ease;
        }
        .infra-item:hover { background: rgba(239, 246, 255, 0.95); border-color: rgba(125, 173, 230, 0.45); }
        .infra-item select { width: 100%; text-align-last: left; margin-top: 5px; }
        .infra-item .item-subtype,
        .infra-item .item-subtype option {
            font-size: 80%;
        }
        .infra-item input { width: 100%; margin-top: 5px; }
        .posadowienie-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 6px;
        }
        .posadowienie-btn {
            border: 1px solid rgba(147, 197, 253, 0.7);
            background: rgba(219, 234, 254, 0.5);
            color: #1d4ed8;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .posadowienie-btn:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
        }
        .posadowienie-btn.active {
            background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
            border-color: rgba(96, 165, 250, 0.8);
            color: #0f2742;
            box-shadow: 0 6px 14px -8px rgba(37, 99, 235, 0.7);
        }
        .item-slup-kafelki {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .slup-tile {
            border: 1px solid rgba(147, 197, 253, 0.7);
            background: rgba(255, 255, 255, 0.75);
            border-radius: 10px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .slup-tile:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
        }
        .slup-tile.active {
            border-color: rgba(59, 130, 246, 0.95);
            background: linear-gradient(135deg, rgba(191, 219, 254, 0.8) 0%, rgba(147, 197, 253, 0.65) 100%);
            box-shadow: 0 8px 14px -10px rgba(37, 99, 235, 0.8);
        }
        .slup-tile img {
            width: 100%;
            height: 74px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(239, 246, 255, 0.8);
        }
        .slup-tile span {
            font-size: 11px;
            font-weight: 700;
            color: #1e3a8a;
            text-align: center;
            line-height: 1.2;
        }
        #infra-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--glass-border);
            flex: 1;
            min-height: 0;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
        }
        #infra-container.trzy-kafelki .infra-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .btn-remove { 
            position: absolute; top: 15px; right: 15px; background: var(--red); 
            color: white; border: none; border-radius: 50%; width: 22px; height: 22px; 
            cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }

        /* ?noCode=1 — panel CRM: bez kodu 6-cyfrowego i zapisu do bazy */
        body.kalkulator-no-code .code-panels {
            display: none !important;
        }

    </style>
</head>
<body>

<div class="split-layout">
<div id="geoportal-view" class="view active">
    <button type="button" id="map-fullscreen-btn" class="map-fullscreen-btn">Otwórz na cały ekran</button>
    <iframe id="live-frame" src="https://geoportal-krajowy.pl/na-mapie" style="width:100%; height:100%; border:none;"></iframe>
</div>

<div id="calc-view" class="view active">
    <div class="calc-wrapper">
        <div class="calc-tab-nav">
            <button type="button" id="calc-tab-btn-parametry" class="calc-tab-btn active" onclick="przelaczZakladkeKalkulatora('parametry')">1. Parametry</button>
            <button type="button" id="calc-tab-btn-wynik" class="calc-tab-btn" onclick="przelaczZakladkeKalkulatora('wynik')">2. Wynagrodzenie</button>
        </div>

        <div id="calc-tab-pane-parametry" class="calc-tab-pane active">
        <div class="premium-card">
            <div class="card-header">Parametry Infrastruktury</div>

            <div class="parcel-controls">
                <div class="control-field">
                    <label for="parcel-type-select">Rodzaj działki (MPZP)</label>
                    <select id="parcel-type-select" onchange="przelicz()">
                        <option value="ROLNA_LESNA">Rolna/Leśna</option>
                        <option value="MIESZKANIOWA_JEDNORODZINNA">Mieszkaniowa Jednorodzinna</option>
                        <option value="MIESZKANIOWA_WIELORODZINNA">Mieszkaniowa Wielorodzinna</option>
                        <option value="USLUGI">Usługi</option>
                    </select>
                </div>
                <div class="control-field">
                    <label for="in-price">Wartość gruntu (zł/m²)</label>
                    <input type="number" id="in-price" value="250" oninput="przelicz()">
                </div>
            </div>

            <div class="btn-add-group" style="position: sticky; top: 0; z-index: 30; background: rgba(219, 234, 254, 0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border);">
                <button type="button" class="btn-add btn-add-energy" onclick="dodajInfrastrukture('E')">+ ENERGIA</button>
                <button type="button" class="btn-add btn-add-gas" onclick="dodajInfrastrukture('G')">+ GAZOCIĄG</button>
            </div>

            <div id="infra-container"></div>
        </div>
        </div>

        <div id="calc-tab-pane-wynik" class="calc-tab-pane">
        <div class="premium-card total-card">
            <div class="card-header">Szacunkowe Wynagrodzenie Łączne</div>
            <div class="summary-box">
                <span class="summary-caption">Kwota łączna: przeszłość + przyszłość</span>
                <div class="range-value" id="range-total">0 PLN</div>
                <div id="breakdown-total" class="breakdown-list"></div>
            </div>
            <div class="code-panels">
                <div class="code-panel">
                    <div class="code-panel-title">Zapisz wyniki pod kodem</div>
                    <div class="seller-fields seller-fields--save-panel">
                        <div class="control-field control-field--handlowiec-code">
                            <label>Numer handlowca (4 cyfry)</label>
                            <div
                                class="handlowiec-code-digits"
                                role="group"
                                aria-label="Numer handlowca, cztery cyfry"
                            >
                                <input
                                    id="sales-agent-code-d0"
                                    type="text"
                                    maxlength="1"
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    autocomplete="one-time-code"
                                    class="handlowiec-digit-input"
                                    disabled
                                    aria-label="Cyfra 1"
                                />
                                <input
                                    id="sales-agent-code-d1"
                                    type="text"
                                    maxlength="1"
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    autocomplete="off"
                                    class="handlowiec-digit-input"
                                    disabled
                                    aria-label="Cyfra 2"
                                />
                                <input
                                    id="sales-agent-code-d2"
                                    type="text"
                                    maxlength="1"
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    autocomplete="off"
                                    class="handlowiec-digit-input"
                                    disabled
                                    aria-label="Cyfra 3"
                                />
                                <input
                                    id="sales-agent-code-d3"
                                    type="text"
                                    maxlength="1"
                                    inputmode="numeric"
                                    pattern="[0-9]*"
                                    autocomplete="off"
                                    class="handlowiec-digit-input"
                                    disabled
                                    aria-label="Cyfra 4"
                                />
                            </div>
                        </div>
                        <div class="control-field">
                            <label for="sales-agent-phone">Numer telefonu handlowca</label>
                            <input
                                id="sales-agent-phone"
                                type="tel"
                                inputmode="tel"
                                autocomplete="tel"
                                placeholder="np. 500 600 700"
                                disabled
                            />
                        </div>
                    </div>
                    <button id="btn-generate-code" class="code-generate-btn">Wygeneruj kod</button>
